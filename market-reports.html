<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Market Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#22263A;--border:#2A2D3E;
  --text:#E8EDF5;--muted:#6B7280;--accent:#3B82F6;--accent-light:#1E3A5F;
  --green:#10B981;--green-light:#064E3B;--red:#EF4444;--red-light:#450A0A;
  --yellow:#F59E0B;--yellow-light:#451A03;--purple:#8B5CF6;--purple-light:#2E1065;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 20px 80px;}
.container{max-width:860px;margin:0 auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px;}
.title{font-family:'Lora',serif;font-size:28px;font-weight:400;}
.title span{color:var(--accent);}
.last-updated{font-size:12px;color:var(--muted);}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:border-color 0.2s;}
.refresh-btn:hover{border-color:var(--accent);}
.refresh-btn.spinning svg{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.date-range{font-size:13px;color:var(--muted);margin-bottom:20px;}
.date-range strong{color:var(--text);}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:10px;padding:4px;width:fit-content;}
.tab{padding:8px 18px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--accent);color:#fff;}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.summary-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.summary-card .val{font-size:26px;font-weight:600;}
.summary-card .sub{font-size:12px;color:var(--muted);margin-top:3px;}
.watchlist-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px;}
.watchlist-box .wl-title{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.wl-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:10px;}
.wl-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px;}
.wl-chip button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:0;}
.wl-chip button:hover{color:var(--red);}
.wl-add{display:flex;gap:8px;}
.wl-add input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;text-transform:uppercase;}
.wl-add input:focus{border-color:var(--accent);}
.wl-add input::placeholder{color:var(--muted);text-transform:none;}
.wl-add button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.section-count{background:var(--surface2);border-radius:99px;padding:2px 10px;font-size:12px;color:var(--muted);}
.day-group{margin-bottom:16px;}
.day-label{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:8px;padding-left:4px;display:flex;align-items:center;gap:8px;}
.today-badge{background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:99px;font-weight:600;}
.tomorrow-badge{background:var(--yellow);color:#000;font-size:10px;padding:1px 7px;border-radius:99px;font-weight:600;}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.2s;}
.report-card:hover{border-color:var(--accent);}
.impact-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.impact-dot.high{background:var(--red);}
.impact-dot.medium{background:var(--yellow);}
.impact-dot.low{background:var(--green);}
.report-info{flex:1;min-width:0;}
.ticker-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ticker{font-size:13px;font-weight:700;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:6px;}
.report-name{font-size:15px;font-weight:500;}
.report-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.report-time{font-size:12px;color:var(--muted);}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
.cat-earnings{background:var(--accent-light);color:var(--accent);}
.cat-economic{background:var(--purple-light);color:var(--purple);}
.cat-fed{background:var(--red-light);color:var(--red);}
.eps-row{font-size:12px;color:var(--muted);margin-top:4px;}
.eps-row span{color:var(--text);}
.report-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.impact-badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;}
.impact-badge.high{background:var(--red-light);color:var(--red);}
.impact-badge.medium{background:var(--yellow-light);color:var(--yellow);}
.impact-badge.low{background:var(--green-light);color:var(--green);}
.ext-link{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px 5px;border-radius:6px;display:flex;align-items:center;transition:color 0.15s;}
.ext-link:hover{color:var(--accent);}
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:82vh;overflow-y:auto;}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;}
.modal-hdr h2{font-size:17px;font-weight:500;line-height:1.3;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:24px;line-height:1;flex-shrink:0;padding:0;}
.modal-close:hover{color:var(--text);}
.m-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.m-section{margin-bottom:18px;}
.m-text{font-size:14px;color:var(--text);line-height:1.7;}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.m-stat{background:var(--surface2);border-radius:10px;padding:12px;}
.m-stat .sl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.m-stat .sv{font-size:16px;font-weight:600;}
.m-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.m-tag{background:var(--surface2);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--muted);}
.m-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.m-link{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;transition:opacity 0.15s;}
.m-link:hover{opacity:0.85;}
.m-link.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.ai-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.ai-box .ai-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;}
.ai-spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">📈 Market <span>Reports</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="last-updated" id="lastUpdated">Loading…</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>
  <div class="date-range" id="dateRange"></div>

  <div class="watchlist-box">
    <div class="wl-title">⭐ My Watchlist</div>
    <div class="wl-chips" id="wlChips"></div>
    <div class="wl-add">
      <input type="text" id="tickerInput" placeholder="Add ticker (e.g. NVDA)" maxlength="10"/>
      <button onclick="addTicker()">Add</button>
    </div>
  </div>

  <div class="summary-row" id="summaryRow"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',this)">All Reports</button>
    <button class="tab" onclick="switchTab('earnings',this)">Earnings</button>
    <button class="tab" onclick="switchTab('economic',this)">Economic</button>
    <button class="tab" onclick="switchTab('watchlist',this)">My Watchlist</button>
  </div>

  <div id="mainContent"><div class="loading"><div class="spinner"></div>Loading reports…</div></div>
</div>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const FKEY = 'd8iq7dhr01qtcvnt63g0d8iq7dhr01qtcvnt63gg';
let allEarnings = [], allEconomic = [], currentTab = 'all', renderedItems = [];
let watchlist = JSON.parse(localStorage.getItem('mkt_watchlist') || '["AAPL","NVDA","MSFT","AVGO","TSLA"]');

function fmt(d){ return d.toISOString().split('T')[0]; }
function todayStr(){ return fmt(new Date()); }
function tomorrowStr(){ var d=new Date(); d.setDate(d.getDate()+1); return fmt(d); }
function twoWeeksStr(){ var d=new Date(); d.setDate(d.getDate()+14); return fmt(d); }
function displayDate(s){ return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); }

// WATCHLIST
function saveWL(){ localStorage.setItem('mkt_watchlist', JSON.stringify(watchlist)); }
function renderWL(){
  var el=document.getElementById('wlChips'); el.innerHTML='';
  watchlist.forEach(function(t){
    var c=document.createElement('div'); c.className='wl-chip';
    c.innerHTML=t+' <button onclick="removeTicker(\''+t+'\')">×</button>';
    el.appendChild(c);
  });
}
function addTicker(){
  var inp=document.getElementById('tickerInput');
  var v=inp.value.trim().toUpperCase();
  if(!v||watchlist.includes(v)){inp.value='';return;}
  watchlist.push(v); saveWL(); renderWL(); inp.value=''; renderContent();
}
function removeTicker(t){
  watchlist=watchlist.filter(function(x){return x!==t;}); saveWL(); renderWL(); renderContent();
}

// FETCH
// Top market-moving companies by importance tier
var TIER1 = ['AAPL','MSFT','NVDA','AMZN','GOOGL','GOOG','META','TSLA','AVGO','BRK.B','JPM','V','UNH','XOM','LLY','JNJ','WMT','MA','PG','HD'];
var TIER2 = ['BAC','ABBV','MRK','CVX','KO','PEP','ORCL','CSCO','ACN','MCD','ABT','CRM','NKE','TMO','COST','DIS','INTC','IBM','QCOM','AMD','NFLX','PYPL','ADBE','TXN','HON','GS','MS','CAT','BA','GE'];

async function fetchEarnings(from, to){
  var r=await fetch('https://finnhub.io/api/v1/calendar/earnings?from='+from+'&to='+to+'&token='+FKEY);
  var d=await r.json();
  var all=(d.earningsCalendar||[]).map(function(e){
    var inWatchlist=watchlist.includes(e.symbol);
    var inTier1=TIER1.includes(e.symbol);
    var inTier2=TIER2.includes(e.symbol);
    var score=0;
    if(inWatchlist) score+=100;
    if(inTier1) score+=50;
    if(inTier2) score+=25;
    // Boost by revenue estimate size
    if(e.revenueEstimate) score+=Math.min(20, e.revenueEstimate/5e9);
    return {
      type:'earnings', date:e.date, name:e.company||e.symbol, ticker:e.symbol,
      time: e.hour==='bmo'?'🌅 Before Open':e.hour==='amc'?'🌙 After Close':'🕐 During Hours',
      epsEstimate:e.epsEstimate, revenueEstimate:e.revenueEstimate,
      impact: (inWatchlist||inTier1)?'high':inTier2?'medium':'low',
      category:'earnings', score:score
    };
  });
  // Sort by score, take top 20 earnings + always include watchlist items
  var watchlistItems=all.filter(function(e){return watchlist.includes(e.ticker);});
  var topItems=all.filter(function(e){return !watchlist.includes(e.ticker);})
    .sort(function(a,b){return b.score-a.score;})
    .slice(0,20-Math.min(watchlistItems.length,5));
  return watchlistItems.concat(topItems);
}

async function fetchEconomic(from, to){
  // Known 2026 US economic calendar
  var KNOWN = [
    {date:'2026-06-11',name:'FOMC Meeting Day 1',impact:'high',category:'fed',description:'Federal Reserve two-day policy meeting begins. Markets watch for any signals on rate path.'},
    {date:'2026-06-12',name:'CPI (May 2026)',impact:'high',category:'economic',description:'Consumer Price Index for May 2026 — the primary inflation gauge. Key for Fed policy decisions.'},
    {date:'2026-06-12',name:'FOMC Rate Decision',impact:'high',category:'fed',description:'Fed announces interest rate decision and holds press conference. One of the most market-moving events.'},
    {date:'2026-06-13',name:'PPI (May 2026)',impact:'high',category:'economic',description:'Producer Price Index — measures wholesale inflation, an early signal for consumer prices.'},
    {date:'2026-06-18',name:'Retail Sales (May 2026)',impact:'high',category:'economic',description:'Consumer spending at retail stores. Drives ~70% of US GDP — key growth indicator.'},
    {date:'2026-06-19',name:'Jobless Claims',impact:'medium',category:'economic',description:'Weekly initial unemployment claims — a leading indicator of labor market health.'},
    {date:'2026-06-20',name:'Existing Home Sales (May)',impact:'medium',category:'economic',description:'Sales of previously-owned homes. Reflects consumer confidence and mortgage rate impact.'},
    {date:'2026-06-25',name:'Consumer Confidence',impact:'medium',category:'economic',description:'Conference Board index measuring how optimistic consumers feel about the economy.'},
    {date:'2026-06-26',name:'GDP Q1 2026 (Final)',impact:'high',category:'economic',description:'Final revision of Q1 2026 GDP growth rate — the broadest measure of economic output.'},
    {date:'2026-06-27',name:'PCE Price Index (May)',impact:'high',category:'economic',description:"Personal Consumption Expenditures — the Fed preferred inflation measure. Crucial for rate outlook."},
    {date:'2026-07-02',name:'Nonfarm Payrolls (June)',impact:'high',category:'economic',description:'Monthly jobs report — most watched economic release. Shows jobs added/lost and wage growth.'},
    {date:'2026-07-02',name:'Unemployment Rate (June)',impact:'high',category:'economic',description:'Percentage of labor force that is unemployed. Key Fed dual-mandate indicator.'},
    {date:'2026-07-10',name:'CPI (June 2026)',impact:'high',category:'economic',description:'Consumer Price Index for June — shows if inflation is cooling or reaccelerating.'},
    {date:'2026-07-15',name:'Retail Sales (June 2026)',impact:'high',category:'economic',description:'Consumer spending data for June — critical for Q3 GDP estimates.'},
    {date:'2026-07-25',name:'PCE Price Index (June)',impact:'high',category:'economic',description:"Fed preferred inflation gauge for June — directly impacts rate cut expectations."},
  ];
  return KNOWN.filter(function(e){ return e.date>=from && e.date<=to; })
    .map(function(e){ return {type:'economic',date:e.date,name:e.name,country:'US',impact:e.impact,category:e.category,description:e.description}; });
}

async function loadAll(){
  var btn=document.getElementById('refreshBtn'); btn.classList.add('spinning');
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div>Fetching reports…</div>';
  var from=todayStr(), to=twoWeeksStr();
  var fromD=new Date(from+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric'});
  var toD=new Date(to+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('dateRange').innerHTML='Showing <strong>'+fromD+'</strong> → <strong>'+toD+'</strong>';
  try{
    var results=await Promise.all([fetchEarnings(from,to), fetchEconomic(from,to)]);
    allEarnings=results[0]; allEconomic=results[1];
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    renderSummary(); renderContent();
  }catch(e){
    document.getElementById('mainContent').innerHTML='<div class="empty">Error loading reports. Try refreshing.</div>';
  }
  btn.classList.remove('spinning');
}

function renderSummary(){
  var all=allEarnings.concat(allEconomic);
  var high=all.filter(function(e){return e.impact==='high';}).length;
  var wlCount=allEarnings.filter(function(e){return watchlist.includes(e.ticker);}).length;
  document.getElementById('summaryRow').innerHTML=
    '<div class="summary-card"><div class="lbl">High Impact</div><div class="val" style="color:var(--red)">'+high+'</div><div class="sub">Next 2 weeks</div></div>'+
    '<div class="summary-card"><div class="lbl">Earnings</div><div class="val" style="color:var(--accent)">'+allEarnings.length+'</div><div class="sub">Company reports</div></div>'+
    '<div class="summary-card"><div class="lbl">Economic</div><div class="val" style="color:var(--purple)">'+allEconomic.length+'</div><div class="sub">US data releases</div></div>'+
    '<div class="summary-card"><div class="lbl">Watchlist</div><div class="val" style="color:var(--green)">'+wlCount+'</div><div class="sub">Your stocks</div></div>';
}

function switchTab(tab, el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active'); renderContent();
}

function renderContent(){
  renderedItems=[];
  var items=[];
  if(currentTab==='all') items=allEarnings.concat(allEconomic);
  else if(currentTab==='earnings') items=allEarnings;
  else if(currentTab==='economic') items=allEconomic;
  else items=allEarnings.filter(function(e){return watchlist.includes(e.ticker);});
  if(!items.length){document.getElementById('mainContent').innerHTML='<div class="empty">No reports found.</div>';return;}
  items.sort(function(a,b){return a.date.localeCompare(b.date);});
  var grouped={};
  items.forEach(function(item){if(!grouped[item.date])grouped[item.date]=[];grouped[item.date].push(item);});
  Object.keys(grouped).forEach(function(d){
    grouped[d].sort(function(a,b){var o={high:0,medium:1,low:2};return o[a.impact]-o[b.impact];});
  });
  var high=items.filter(function(e){return e.impact==='high';}).length;
  var html='<div class="section-header"><span class="section-title">'+items.length+' Reports</span><span class="section-count">🔴 '+high+' high impact</span></div>';
  var today=todayStr(), tomorrow=tomorrowStr();
  Object.keys(grouped).sort().forEach(function(date){
    var tb=date===today?'<span class="today-badge">TODAY</span>':'';
    var tmb=date===tomorrow?'<span class="tomorrow-badge">TOMORROW</span>':'';
    html+='<div class="day-group"><div class="day-label">'+displayDate(date)+' '+tb+tmb+'</div>';
    grouped[date].forEach(function(item){
      var idx=renderedItems.length; renderedItems.push(item);
      html+=renderCard(item,idx);
    });
    html+='</div>';
  });
  document.getElementById('mainContent').innerHTML=html;
}

function renderCard(item, idx){
  var extUrl=item.type==='earnings'
    ?'https://finance.yahoo.com/quote/'+item.ticker
    :'https://www.investopedia.com/search?q='+encodeURIComponent(item.name);
  var watched=item.ticker&&watchlist.includes(item.ticker);
  var infoHtml='';
  if(item.type==='earnings'){
    var eps=item.epsEstimate?'Est. EPS: <span>$'+item.epsEstimate+'</span>':'';
    var rev=item.revenueEstimate?'Est. Rev: <span>$'+(item.revenueEstimate/1e9).toFixed(1)+'B</span>':'';
    infoHtml='<div class="ticker-row"><span class="ticker">'+item.ticker+'</span><span class="report-name">'+item.name+'</span>'+(watched?'⭐':'')+'</div>'+
      '<div class="report-meta"><span class="report-time">'+item.time+'</span><span class="cat-badge cat-earnings">Earnings</span></div>'+
      (eps||rev?'<div class="eps-row">'+eps+(eps&&rev?' · ':'')+rev+'</div>':'');
  } else {
    infoHtml='<div class="report-name">'+item.name+'</div>'+
      '<div class="report-meta"><span class="cat-badge '+(item.category==='fed'?'cat-fed':'cat-economic')+'">'+(item.category==='fed'?'FED':'Economic')+'</span><span class="report-time">🇺🇸 US</span></div>';
  }
  return '<div class="report-card" onclick="openPreview('+idx+')">'
    +'<div class="impact-dot '+item.impact+'"></div>'
    +'<div class="report-info">'+infoHtml+'</div>'
    +'<div class="report-right">'
    +'<div class="impact-badge '+item.impact+'">'+item.impact.toUpperCase()+'</div>'
    +'<a href="'+extUrl+'" target="_blank" onclick="event.stopPropagation()" class="ext-link" title="Open source">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
    +'</a></div></div>';
}

// MODAL
function openPreview(idx){
  var item=renderedItems[idx]; if(!item)return;
  document.getElementById('modal').style.display='flex';
  document.getElementById('modalTitle').textContent=item.type==='earnings'?item.ticker+' — '+item.name:item.name;
  document.getElementById('modalBody').innerHTML='<div class="loading" style="padding:24px"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div>';
  if(item.type==='earnings') loadEarningsPreview(item);
  else loadEconomicPreview(item);
}

function closeModalOverlay(e){ if(e.target===document.getElementById('modal'))document.getElementById('modal').style.display='none'; }

async function loadEarningsPreview(item){
  try{
    var pRes=await fetch('https://finnhub.io/api/v1/stock/profile2?symbol='+item.ticker+'&token='+FKEY);
    var mRes=await fetch('https://finnhub.io/api/v1/stock/metric?symbol='+item.ticker+'&metric=all&token='+FKEY);
    var p=await pRes.json(), metrics=await mRes.json();
    var m=metrics.metric||{};
    var cap=p.marketCapitalization?'$'+(p.marketCapitalization/1000).toFixed(1)+'B':'N/A';
    var pe=m.peNormalizedAnnual?m.peNormalizedAnnual.toFixed(1):'N/A';
    var hi=m['52WeekHigh']?'$'+m['52WeekHigh'].toFixed(2):'N/A';
    var lo=m['52WeekLow']?'$'+m['52WeekLow'].toFixed(2):'N/A';
    var eps=item.epsEstimate?'$'+item.epsEstimate:'N/A';
    var rev=item.revenueEstimate?'$'+(item.revenueEstimate/1e9).toFixed(2)+'B':'N/A';

    document.getElementById('modalBody').innerHTML=
      (p.logo?'<img src="'+p.logo+'" style="height:36px;margin-bottom:12px;border-radius:6px" onerror="this.style.display=\'none\'"/>':'')
      +'<div class="m-tags">'
      +(p.finnhubIndustry?'<span class="m-tag">📊 '+p.finnhubIndustry+'</span>':'')
      +(p.exchange?'<span class="m-tag">🏛 '+p.exchange+'</span>':'')
      +(p.country?'<span class="m-tag">🌍 '+p.country+'</span>':'')
      +'</div>'
      +(p.description?'<div class="m-section"><div class="m-label">About</div><div class="m-text">'+p.description.slice(0,280)+'…</div></div>':'')
      +'<div class="m-section"><div class="m-label">Upcoming Report</div><div class="m-grid">'
      +'<div class="m-stat"><div class="sl">Report Date</div><div class="sv">'+item.date+'</div></div>'
      +'<div class="m-stat"><div class="sl">Timing</div><div class="sv" style="font-size:13px">'+item.time+'</div></div>'
      +'<div class="m-stat"><div class="sl">EPS Estimate</div><div class="sv" style="color:var(--green)">'+eps+'</div></div>'
      +'<div class="m-stat"><div class="sl">Revenue Est.</div><div class="sv" style="color:var(--accent)">'+rev+'</div></div>'
      +'</div></div>'
      +'<div class="m-section"><div class="m-label">Key Stats</div><div class="m-grid">'
      +'<div class="m-stat"><div class="sl">Market Cap</div><div class="sv">'+cap+'</div></div>'
      +'<div class="m-stat"><div class="sl">P/E Ratio</div><div class="sv">'+pe+'</div></div>'
      +'<div class="m-stat"><div class="sl">52W High</div><div class="sv" style="color:var(--green)">'+hi+'</div></div>'
      +'<div class="m-stat"><div class="sl">52W Low</div><div class="sv" style="color:var(--red)">'+lo+'</div></div>'
      +'</div></div>'
      +'<div class="ai-box"><div class="ai-label">🤖 What to Watch</div><div id="aiSummary"><div class="ai-loading"><div class="ai-spinner"></div>Generating analyst briefing…</div></div></div>'
      +'<div class="m-links">'
      +'<a href="https://finance.yahoo.com/quote/'+item.ticker+'" target="_blank" class="m-link">📈 Yahoo Finance</a>'
      +'<a href="https://seekingalpha.com/symbol/'+item.ticker+'/earnings" target="_blank" class="m-link sec">📰 Seeking Alpha</a>'
      +'</div>';

    generateAISummary('earnings', item.ticker, item.name, item.date, p.finnhubIndustry||'', item.epsEstimate, item.revenueEstimate, null, null, null);
  }catch(e){
    document.getElementById('modalBody').innerHTML='<div class="m-text" style="color:var(--muted)">Could not load. <a href="https://finance.yahoo.com/quote/'+item.ticker+'" target="_blank" style="color:var(--accent)">View on Yahoo Finance →</a></div>';
  }
}

function loadEconomicPreview(item){
  document.getElementById('modalBody').innerHTML=
    '<div class="m-section"><div class="m-label">What is this report?</div><div class="m-text">'+(item.description||'An important US economic data release.')+'</div></div>'
    +'<div class="m-section"><div class="m-label">Report Details</div><div class="m-grid">'
    +'<div class="m-stat"><div class="sl">Release Date</div><div class="sv">'+item.date+'</div></div>'
    +'<div class="m-stat"><div class="sl">Impact</div><div class="sv" style="color:var(--red)">'+item.impact.toUpperCase()+'</div></div>'
    +'</div></div>'
    +'<div class="ai-box"><div class="ai-label">🤖 What to Watch</div><div id="aiSummary"><div class="ai-loading"><div class="ai-spinner"></div>Generating analyst briefing…</div></div></div>'
    +'<div class="m-links">'
    +'<a href="https://www.investopedia.com/search?q='+encodeURIComponent(item.name)+'" target="_blank" class="m-link">📚 Investopedia</a>'
    +'<a href="https://tradingeconomics.com/united-states/'+encodeURIComponent((item.name||'').toLowerCase().replace(/\s+/g,'-'))+'" target="_blank" class="m-link sec">📊 Trading Economics</a>'
    +'</div>';

  generateAISummary('economic', null, item.name, item.date, null, null, null, item.description, item.estimate, item.previous);
}

function generateAISummary(type, ticker, name, date, industry, eps, revenue, description, estimate, previous){
  var el=document.getElementById('aiSummary');
  if(!el) return;

  var text='';

  if(type==='earnings'){
    var epsStr=eps?'$'+eps:null;
    var revStr=revenue?'$'+(revenue/1e9).toFixed(2)+'B':null;

    // Company-specific summaries for major names
    var KNOWN={
      'NVDA': 'NVIDIA is the dominant AI chip supplier, with analysts watching data center revenue growth and Blackwell GPU demand. Key question: can AI infrastructure spending sustain momentum heading into H2? A beat with strong guidance could push the stock to new highs, while any slowdown in hyperscaler orders may trigger a sharp pullback.',
      'AAPL': 'Apple investors focus on iPhone demand trends, Services revenue growth, and any AI (Apple Intelligence) monetization updates. China sales remain a wildcard. A revenue beat driven by Services could re-rate the stock higher, while iPhone unit disappointments may pressure shares.',
      'MSFT': 'Microsoft is a key bellwether for enterprise AI adoption — watch Azure cloud growth and Copilot monetization progress. Analysts expect AI to add meaningful revenue. Strong Azure numbers typically lift the entire cloud sector.',
      'AMZN': 'Amazon report centers on AWS cloud growth and advertising revenue acceleration. Margin expansion from cost cuts has been a major theme. Strong AWS guidance would be bullish for the entire tech sector and cloud peers.',
      'META': 'Meta investors focus on ad revenue growth, user engagement across Facebook and Instagram, and AI infrastructure spending (capex). Reality Labs losses are closely tracked. Ad market strength is the key driver — any acceleration signals well for digital advertising broadly.',
      'GOOGL': 'Alphabet report pivots on Search revenue resilience vs. AI competition, YouTube ad growth, and Google Cloud momentum. AI Overviews impact on search monetization is the critical new variable to watch.',
      'TSLA': 'Tesla reports are always volatile — watch vehicle deliveries vs. estimates, energy storage revenue (a breakout segment), and any update on the robotaxi timeline. Margins are under pressure from price cuts. Elon Musk commentary on FSD and autonomous driving often moves the stock more than the numbers.',
      'AVGO': 'Broadcom is a key AI beneficiary through custom AI chips (XPUs) for hyperscalers and VMware integration revenue. Analysts watch AI chip revenue guidance and VMware subscription conversion progress. Strong AI chip demand signals align with the broader AI capex cycle.',
      'JPM': 'JPMorgan is the banking bellwether — watch net interest income trends, loan growth, credit quality, and trading revenue. CEO Jamie Dimon economic outlook comments often move the entire financial sector.',
      'NFLX': 'Netflix focus is on subscriber additions, average revenue per user, and ad-supported tier adoption. Password sharing crackdown tailwinds may be moderating — next quarter guidance is the key number to watch.',
      'AMD': 'AMD is NVIDIA closest AI chip rival — watch MI300X GPU sales and data center revenue growth. Any market share gains vs. NVIDIA, or hyperscaler customer wins, could be a major positive catalyst. PC market recovery is a secondary theme.',
    };

    if(KNOWN[ticker]){
      text=KNOWN[ticker];
    } else {
      // Generate dynamic summary from available data
      var lines=[];
      lines.push(name+' ('+(ticker||'N/A')+') reports on '+date+(industry?' in the '+industry+' sector.':'.')); 
      if(epsStr||revStr){
        var estLine='Consensus expects';
        if(epsStr) estLine+=' EPS of '+epsStr;
        if(epsStr&&revStr) estLine+=' and';
        if(revStr) estLine+=' revenue of '+revStr;
        estLine+='.';
        lines.push(estLine);
      }
      lines.push('Watch for management guidance and any commentary on macro conditions, cost pressures, and demand trends in their end markets.');
      lines.push('A beat with raised guidance typically drives a 5-10% move up; a miss or cut guidance can cause a sharp selloff.');
      text=lines.join(' ');
    }
  } else {
    // Economic reports
    var ECO_KNOWN={
      'CPI': 'The Consumer Price Index is the market primary inflation gauge. With the Fed laser-focused on getting inflation to 2%, any upside surprise (hotter inflation) would push back rate cut expectations and pressure stocks and bonds. A cool reading accelerates the rate cut timeline and is generally bullish for equities — especially growth and tech.',
      'FOMC': 'The Federal Reserve rate decision is the single most market-moving event of the quarter. Beyond the rate decision itself, markets parse every word of the Fed statement and Chair Powell press conference for clues on the rate cut timeline. Even a hold can spark big moves if the tone shifts hawkish or dovish.',
      'Nonfarm': 'The monthly jobs report (NFP) is the most watched US economic release. Strong job creation above ~200K signals a resilient economy but may delay Fed rate cuts. A weak number raises recession fears but could accelerate cuts. The unemployment rate and average hourly earnings (wage inflation) are equally important to watch.',
      'PCE': 'Personal Consumption Expenditures is the Federal Reserve preferred inflation measure — more important than CPI for Fed policy. A cool PCE reading supports the case for rate cuts and is bullish for stocks. Hot PCE pushes rate cuts further out and typically pressures growth stocks and bonds.',
      'GDP': 'GDP is the broadest measure of US economic health. A strong reading confirms economic resilience, while a contraction raises recession fears. Markets focus on the composition — consumer spending strength is the most important component, driving ~70% of US economic output.',
      'Retail Sales': 'Retail sales directly measures consumer spending — the engine of the US economy. A strong number signals consumers remain resilient up despite higher rates, supporting corporate earnings. A weak number raises growth concerns and may accelerate Fed easing expectations.',
      'PPI': 'Producer Price Index measures inflation at the wholesale level — an early warning signal for future consumer prices. Hot PPI can foreshadow higher CPI next month, while cool PPI supports the disinflation narrative. Markets use it to calibrate Fed rate cut expectations.',
      'Jobless Claims': 'Weekly jobless claims are the most timely read on US labor market health. A spike above 250K would signal cracks forming in employment — raising recession fears. Low claims confirm labor market resilience. This data point rarely moves markets dramatically unless it shows an unexpected trend shift.',
    };

    var summary='';
    for(var key in ECO_KNOWN){
      if(name.indexOf(key)!==-1){ summary=ECO_KNOWN[key]; break; }
    }
    if(!summary) summary=(description||'This economic release provides important data on the health of the US economy.')+' Markets will react based on whether the data beats or misses consensus expectations and what it implies for Federal Reserve policy and interest rates.';
    text=summary;
  }

  el.innerHTML='<div class="m-text" style="line-height:1.75">'+text+'</div>';
}

document.getElementById('tickerInput').addEventListener('keydown',function(e){if(e.key==='Enter')addTicker();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')document.getElementById('modal').style.display='none';});

renderWL();
loadAll();
setInterval(loadAll, 30*60*1000);
</script>
